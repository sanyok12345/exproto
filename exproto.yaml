server:
  bind: 0.0.0.0
  port: 443
  # max-workers: 4
  # proxy_tag: "aabbccddeeff00112233445566778899"

tls:
  domain: www.google.com

  handshake:
    fragment: true

  stream:
    max_record_size: 16640
    record_jitter: 0.03

  # fallback:
  #   hosts:
  #     - "google.com:443"
  #     - "cloudflare.com:443"
  #   timeout: 5000

timeouts:
  handshake: 10
  connect: 10
  idle: 1800

logging:
  level: info

upstream:
  type: direct
  # bind: 10.0.0.1

# max-connections: 50000

healthcheck:
  enabled: true
  interval: 30
  timeout: 5

secrets:
  - name: free
    secret: "00112233445566778899aabbccddeeff"

  - name: premium
    secret: "aabbccddeeff00112233445566778899"
    domain: cdn.jsdelivr.net
    mode: direct
    max-connections: 5000
    ad-tag: "fedcba9876543210fedcba9876543210"
    upstream:
      type: direct
      bind: 10.0.0.2

  - name: partner
    secret: "ffeeddccbbaa99887766554433221100"
    ad-tag: "1234567890abcdef1234567890abcdef"
    upstream:
      type: socks5
      address: proxy.partner.com:1080
      username: exproto
      password: s3cret
